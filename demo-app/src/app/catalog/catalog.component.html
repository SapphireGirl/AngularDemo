<section class="catalog-page py-4 px-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">Catalog</h2>
        <button class="btn btn-outline-primary" (click)="loadCatalog()">Refresh</button>
    </div>

    <p class="text-muted" *ngIf="!isLoading && !errorMessage">Products loaded from the API.</p>

    <div class="alert alert-danger" role="alert" *ngIf="errorMessage">
        {{ errorMessage }}
    </div>

    <div class="text-center my-5" *ngIf="isLoading">
        <div class="spinner-border" role="status" aria-label="Loading catalog"></div>
    </div>

    <div class="row g-3" *ngIf="!isLoading && !errorMessage">
        <div class="col-12 col-md-6 col-lg-4" *ngFor="let item of items">
            <article class="card h-100 shadow-sm">
                <img [src]="item.imageUrl" [alt]="item.title" class="card-img-top product-image" />
                <div class="card-body d-flex flex-column">
                    <span class="badge text-bg-secondary align-self-start mb-2">{{ item.category }}</span>
                    <h5 class="card-title">{{ item.title }}</h5>
                    <p class="card-text text-muted flex-grow-1">{{ item.description }}</p>
                    <p class="fw-semibold mb-0">{{ item.price | currency }}</p>
                </div>
            </article>
        </div>
    </div>
</section>
